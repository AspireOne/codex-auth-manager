no_tty: true

pre-commit:
  parallel: true
  commands:
    golangci-lint:
      glob: "*.go"
      run: go tool -modfile tools.mod github.com/golangci/golangci-lint/v2/cmd/golangci-lint run
    go-test:
      glob: "*.go"
      run: go test -short ./...
    nilaway:
      glob: "*.go"
      run: go tool -modfile tools.mod go.uber.org/nilaway/cmd/nilaway -include-pkgs="codex-manage" ./...
    go-mod-tidy:
      run: go mod tidy && git --no-pager diff --exit-code go.mod go.sum tools.mod tools.sum

commit-msg:
  commands:
    conventional-commits:
      run: |
        grep -Eq '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .{1,72}' {1}
      fail_text: "Commit message does not follow Conventional Commits format (e.g., 'feat(scope): description')"
