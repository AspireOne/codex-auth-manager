version: "2"

run:
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gosec
    - gocyclo
    - gocritic
    - goconst
    - exhaustive

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - codex-manage
